#####################################################################
# Motors
#####################################################################

## Connected to E1-MOT
# [stepper_z2]
# step_pin: PE6
# dir_pin: PC13
# enable_pin: !PE5
# rotation_distance: 40
# gear_ratio: 27:1
# microsteps: 16

## Connected to E0-MOT
# [stepper_z1]
# step_pin: PD5
# dir_pin: PD6
# enable_pin: !PD4
# rotation_distance: 8
# gear_ratio: 27:1
# microsteps: 16

[stepper_x]
##	Connected to X-MOT
step_pin: PE11
dir_pin: !PE10
enable_pin: !PE9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200 
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 306
position_max: 306
homing_speed: 30
homing_retract_dist: 0
homing_positive_dir: true

[stepper_y]
##	Connected to Y-MOT
step_pin: PD8
dir_pin: !PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
position_endstop: 306
position_max: 306
homing_speed: 25
homing_retract_dist: 0
homing_positive_dir: true

##	Connected to Z-MOT
[stepper_z]
step_pin: PD14
dir_pin: !PD13
enable_pin: !PD15
rotation_distance: 8
full_steps_per_rotation: 200
gear_ratio: 64:20
microsteps: 16
endstop_pin: probe:z_virtual_endstop 
position_max: 290
position_min: -10
homing_speed: 10
second_homing_speed: 1
homing_retract_dist: 2.0

#####################################################################
# TMC 2209 [E1][E0][X][Y][Z]
#####################################################################

## Port E1
# [tmc2209 stepper_z2]
# uart_pin: PC14
# uart_address: 0
# interpolate: True
# run_current: 1.5
# hold_current: 0.5
# sense_resistor: 0.110
# stealthchop_threshold: 0

# [tmc2209 stepper_z1]
# uart_pin: PD7
# uart_address: 0
# interpolate: True
# run_current: 1.5
# hold_current: 0.5
# sense_resistor: 0.110
# stealthchop_threshold: 0
# #diag_pin:PG2

[tmc2209 stepper_x]
uart_pin: PE7
interpolate: True
run_current: 1.0
# hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin:^PE0
driver_SGTHRS: 75

[tmc2209 stepper_y]
uart_pin: PE15
interpolate: True
run_current: 1.0
# hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin:^PB13
driver_SGTHRS: 80

[tmc2209 stepper_z]
uart_pin: PD10
uart_address: 0
interpolate: True
run_current: 0.8
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

